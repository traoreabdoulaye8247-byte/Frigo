      <div class="hint" id="aMemo"></div>
    </div>

    <div class="field">
      <label>Catégorie de vente</label>
      <select class="input" id="aCat">
        ${cats.map(c=>`<option value="${c.id}" ${v&&v.categorieId===c.id?'selected':''}>${c.nom} — ${c.prix}${DB.parametres.devise}</option>`).join('')}
      </select>
    </div>

    <div class="row2">
      <div class="field"><label>Cartons</label>
        <input class="input" id="aCartons" type="number" inputmode="numeric" min="0" placeholder="0" value="${v?v.cartons:''}"></div>
      <div class="field"><label>Contenu / carton</label>
        <select class="input" id="aContenu">
          <option value="24" ${v&&v.contenu===24?'selected':''}>24</option>
          <option value="12" ${v&&v.contenu===12?'selected':''}>12</option>
          <option value="6" ${v&&v.contenu===6?'selected':''}>6</option>
        </select></div>
    </div>

    <div class="field">
      <label>Prix global (facture)</label>
      <input class="input" id="aPrix" type="number" inputmode="numeric" min="0" placeholder="Montant total payé" value="${v?v.prixGlobal:''}">
    </div>

    <div class="field">
      <label>Fournisseur (optionnel)</label>
      <input class="input" id="aFourn" list="fournList" placeholder="Ex: DIARRA, ACHOURA..." value="${v?v.fournisseur:''}" autocomplete="off">
      <datalist id="fournList">${DB.fournisseurs.map(f=>`<option value="${f.nom}">`).join('')}</datalist>
    </div>

    ${!a ? `
    <div class="field">
      <label>Paiement à l'achat</label>
      <div class="seg" style="margin-bottom:0">
        <button type="button" class="on" id="payTout" onclick="setPayMode('tout')">Payé tout</button>
        <button type="button" id="payRien" onclick="setPayMode('rien')">Crédit (0)</button>
        <button type="button" id="payPartiel" onclick="setPayMode('partiel')">Partiel</button>
      </div>
      <input class="input" id="aPaye" type="number" inputmode="numeric" min="0" placeholder="Montant payé" style="display:none;margin-top:10px">
      <div class="hint" id="payHint">Toute la facture est payée maintenant.</div>
    </div>` : ''}

    <div class="field">
      <label>Date</label>
      <input class="input" id="aDate" type="date" value="${a?a.date:auj()}">
    </div>

    <div class="btn-group">
      ${a ? `<button class="btn btn-danger btn-sm" id="aDel" style="flex:0 0 auto">🗑️</button>` : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">Annuler</button>
      <button class="btn btn-ambre" id="aSave">${a?'Enregistrer':'Ajouter achat'}</button>
    </div>
  `);

  // Auto-remplissage quand on choisit un produit connu
  function appliquerMemo(nom){
    const m = memoProduit(nom);
    const memoDiv = $('#aMemo');
    if(m){
      $('#aCat').value = m.categorieId;
      // ne pré-remplir prix/carton que si les champs sont vides (mode ajout)
      if(!$('#aCartons').value && m.dernierCartons) $('#aCartons').value = m.dernierCartons;
      if(!$('#aPrix').value && m.dernierPrix) $('#aPrix').value = m.dernierPrix;
      if(m.dernierContenu) $('#aContenu').value = m.dernierContenu;
      if(memoDiv && m.dernierPrix){
        memoDiv.innerHTML = `💡 Dernier achat : ${m.dernierCartons} carton(s) • ${fmt(m.dernierPrix)} ${DB.parametres.devise}`;
      }
    } else if(memoDiv){
      memoDiv.innerHTML = '';
    }
  }

  $('#aProduit').addEventListener('input', e=> appliquerMemo(e.target.value.trim()));

  // Boutons rapides
  document.querySelectorAll('#quickProds .chip').forEach(b=>{
    b.addEventListener('click', ()=>{
      const nom = b.dataset.prod;
      $('#aProduit').value = nom;
      // vider prix/carton pour laisser le mémo re-remplir proprement
      $('#aCartons').value = ''; $('#aPrix').value = '';
      appliquerMemo(nom);
      document.querySelectorAll('#quickProds .chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    });
  });

  $('#aSave').addEventListener('click', ()=>{
    const prixGlobal = Number($('#aPrix').value)||0;
    const data = {
      produitNom: $('#aProduit').value.trim(),
      categorieId: $('#aCat').value,
      cartons: Number($('#aCartons').value)||0,
      contenu: Number($('#aContenu').value)||0,
      prixGlobal,
      fournisseur: $('#aFourn').value.trim(),
      date: $('#aDate').value || auj()
    };
    if(!data.produitNom){ toast('Indiquez le produit','err'); return; }
    if(data.cartons<=0){ toast('Indiquez le nombre de cartons','err'); return; }
    if(data.prixGlobal<=0){ toast('Indiquez le prix de la facture','err'); return; }

    if(a){ modifierAchat(a.id, data); toast('Achat modifié ✓'); }
    else {
      // déterminer le montant payé selon le mode
      const mode = window._payMode || 'tout';
      if(mode==='tout') data.montantPaye = prixGlobal;
      else if(mode==='rien') data.montantPaye = 0;
      else data.montantPaye = Number($('#aPaye').value)||0;
      ajouterAchat(data);
      toast('Achat enregistré ✓');
    }
    closeSheet();
    go('achats');
  });

  $('#aDel')?.addEventListener('click', ()=>{
    sheet(`
      <h2>🗑️ Supprimer cet achat ?</h2>
      <div class="s-sub">${a.produit} • ${dateFr(a.date)} • ${fmt(a.prixGlobal)} ${DB.parametres.devise}</div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="closeSheet()">Annuler</button>
        <button class="btn btn-danger" id="aDelOk">Oui, supprimer</button>
      </div>`);
    $('#aDelOk').addEventListener('click', ()=>{
      supprimerAchat(a.id); toast('Achat supprimé'); closeSheet(); go('achats');
    });
  });
}

/* Graphique à barres verticales (SVG) */
function graphBarres(data, couleur){
  const max = Math.max(...data.map(d=>d.valeur), 1);
  const W = 320, H = 160, pad = 24, bw = (W - pad*2) / data.length;
  const barres = data.map((d,i)=>{
    const h = Math.max(2, (d.valeur/max) * (H - pad*2));
    const x = pad + i*bw + bw*0.15;
    const y = H - pad - h;
    const w = bw*0.7;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${couleur}"/>
      <text x="${(x+w/2).toFixed(1)}" y="${H-pad+12}" font-size="8" fill="#94A3B8" text-anchor="middle">${d.label}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#2A384E" stroke-width="1"/>
    ${barres}
    <text x="${pad}" y="14" font-size="9" fill="#5EEAD4">max ${fmt(max)} ${DB.parametres.devise}</text>
  </svg>`;
}

/* Graphique à barres horizontales (SVG) avec valeurs */
function graphBarresH(data){
  const max = Math.max(...data.map(d=>d.valeur), 1);
  const rowH = 30, W = 320, labelW = 90, barMax = W - labelW - 60;
  const rows = data.slice(0,8).map((d,i)=>{
    const w = Math.max(3, (d.valeur/max) * barMax);
    const y = i*rowH + 6;
    return `
      <text x="0" y="${y+13}" font-size="9" fill="#E8EEF6">${d.label.length>13?d.label.slice(0,12)+'…':d.label}</text>
      <rect x="${labelW}" y="${y}" width="${w.toFixed(1)}" height="18" rx="3" fill="${d.couleur||'#5EEAD4'}"/>
      <text x="${labelW+w+4}" y="${y+13}" font-size="8.5" fill="#94A3B8">${fmt(d.valeur)}</text>`;
  }).join('');
  const H = Math.min(data.length,8)*rowH + 10;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${rows}</svg>`;
}

// ---------- BLOC DÉTAIL DE LA CAISSE (ventes à part) ----------
function blocDetailCaisse(){
  const d = detailCaisse();
  const dev = DB.parametres.devise;
  const ligne = (label, val, sens)=>{
    if(val===0 && (sens==='+v'||sens==='reg')) return ''; // masquer versement/régul si 0
    let signe = '', couleur = 'var(--texte)';
    if(sens==='+' || sens==='+v'){ signe='+'; couleur='var(--vert)'; }
    else if(sens==='-'){ signe='−'; couleur='var(--rouge)'; val=Math.abs(val); }
    else if(sens==='reg'){ signe = d.regularisations>=0?'+':'−'; couleur = d.regularisations>=0?'var(--vert)':'var(--rouge)'; val=Math.abs(val); }
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px">
      <span style="color:var(--texte-doux)">${label}</span>

function bindPlus(){
  // --- Changer le PIN ---
  $('#btnChangePin')?.addEventListener('click', openChangePinSheet);

  // --- Stock de départ ---
  $('#btnStockDepart')?.addEventListener('click', openStockDepartSheet);

  // --- Catégories ---
  $('#addCat')?.addEventListener('click', ()=> openCatEdit());

  // --- Dépense ---
  $('#addDep')?.addEventListener('click', ()=> openDepenseSheet());

  // --- Versement ---
  $('#addVers')?.addEventListener('click', ()=> openVersementSheet());

  // --- Export (fonction partagée) ---
  function faireExport(){
    const data = JSON.stringify(DB, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `frigo_sauvegarde_${auj()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    marquerSauvegarde();
    toast('Sauvegarde téléchargée ✓');
  }
  function faireImport(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const imported = JSON.parse(ev.target.result);
        if(!imported.categories){ toast('Fichier invalide','err'); return; }
        DB = imported;
        migrerDB();          // recrée les champs manquants (emprunts, café…) des anciennes sauvegardes
        sauverDB();
        toast('Données restaurées ✓');
        renderApp();
      }catch(err){ toast('Erreur de lecture','err'); }
    };
    reader.readAsText(file);
  }

  // Gros boutons visibles (haut de page)
  $('#btnExportBig')?.addEventListener('click', faireExport);
  $('#btnImportBig')?.addEventListener('click', ()=> $('#importFileBig').click());
  $('#importFileBig')?.addEventListener('change', e=> faireImport(e.target.files[0]));

  // --- Export ---
  $('#btnExport')?.addEventListener('click', faireExport);

  // --- Import ---
  $('#btnImport')?.addEventListener('click', ()=> $('#importFile').click());
  $('#importFile')?.addEventListener('change', e=> faireImport(e.target.files[0]));

  // --- Reset ---
  $('#btnReset')?.addEventListener('click', ()=>{
    sheet(`
      <h2>🗑️ Réinitialiser</h2>
      <div class="s-sub">Cette action efface TOUTES vos données (achats, inventaires, dépenses). Exportez d'abord si besoin.</div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="closeSheet()">Annuler</button>
        <button class="btn btn-danger" id="rConfirm">Oui, tout effacer</button>
      </div>`);
    $('#rConfirm').addEventListener('click', ()=>{
      DB = dbVide(); sauverDB(); closeSheet(); toast('Données réinitialisées'); renderApp();
    });
  });

  // --- Réglages boutique ---
  $('#saveSet')?.addEventListener('click', ()=>{
    DB.parametres.boutique = $('#setBoutique').value.trim() || 'Mon Frigo';
    sauverDB(); toast('Enregistré ✓'); renderApp();
  });
}

  const liste = type==='dep' ? DB.depenses : DB.versements;

  sheet(`

    ${estDep ? `

    localStorage.setItem(PIN_KEY, nouveau);

function openCatEdit(catId){
  const cat = catId ? DB.categories.find(c=>c.id===catId) : null;
  const couleurs = ['#5EEAD4','#60A5FA','#A78BFA','#FBBF24','#FB923C','#F472B6','#34D399','#F87171','#818CF8','#FACC15'];
  sheet(`
    <h2>${cat?'✏️ Modifier':'🏷️ Nouvelle'} catégorie</h2>
    <div class="field"><label>Nom</label>
      <input class="input" id="cNom" value="${cat?cat.nom:''}" placeholder="Ex: Grand Canette"></div>
    <div class="field"><label>Prix de vente (${DB.parametres.devise})</label>
      <input class="input" id="cPrix" type="number" inputmode="numeric" value="${cat?cat.prix:''}" placeholder="500"></div>
    <div class="field"><label>Seuil d'alerte stock faible</label>
      <input class="input" id="cSeuil" type="number" inputmode="numeric" value="${cat?(cat.seuil!=null?cat.seuil:15):15}" placeholder="15">
      <div class="hint" style="margin-top:5px">Vous serez prévenu quand le stock descend à ce niveau.</div></div>
    <div class="field"><label>Couleur</label>
      <div class="swipe-x" id="colorPick">
        ${couleurs.map(col=>`<button class="chip ${cat&&cat.couleur===col?'on':''}" data-col="${col}"
          style="background:${col};width:36px;height:36px;border-radius:50%;padding:0"></button>`).join('')}
      </div>
    </div>
    <div class="btn-group">
      ${cat?`<button class="btn btn-danger btn-sm" id="cDel" style="flex:0 0 auto">🗑️</button>`:''}
      <button class="btn btn-ghost" onclick="closeSheet()">Annuler</button>
      <button class="btn btn-primary" id="cSave">Enregistrer</button>
    </div>
  `);

  let selCol = cat ? cat.couleur : couleurs[0];
  document.querySelectorAll('#colorPick .chip').forEach(b=>{
    b.addEventListener('click', ()=>{
      selCol = b.dataset.col;
      document.querySelectorAll('#colorPick .chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    });
  });

  $('#cSave').addEventListener('click', ()=>{
    const nom = $('#cNom').value.trim();
    const prix = Number($('#cPrix').value)||0;
    const seuil = Math.max(0, Number($('#cSeuil').value)||0);
    if(!nom){ toast('Indiquez le nom','err'); return; }
    if(prix<=0){ toast('Indiquez le prix','err'); return; }
    if(cat){
      cat.nom = nom; cat.prix = prix; cat.couleur = selCol; cat.seuil = seuil;
    } else {
      DB.categories.push({id:uid('cat'), nom, prix, couleur:selCol, seuil});
    }
    sauverDB(); toast('Catégorie enregistrée ✓'); closeSheet(); go('plus');
  });

  $('#cDel')?.addEventListener('click', ()=>{
    // vérifier qu'aucun achat n'utilise cette catégorie
    const used = DB.achats.some(a=>a.categorieId===cat.id);
    if(used){ toast('Catégorie utilisée par des achats','err'); return; }
    DB.categories = DB.categories.filter(c=>c.id!==cat.id);
    sauverDB(); toast('Catégorie supprimée'); closeSheet(); go('plus');
  });
}

        </select>
      </div>

            <option value="12" ${l.contenu==12?'selected':''}>12 / carton</option>

  if(window._factureFourn!==undefined){ const el=$('#fFourn'); if(el) el.value=window._factureFourn; }
  if(window._factureDate){ const el=$('#fDate'); if(el) el.value=window._factureDate; }

// Sauvegarder les champs communs avant de re-rendre (ajout/suppression de ligne)
function factureSauverCommuns(){
  const f=$('#fFourn'), d=$('#fDate'), p=$('#fPartiel');
  if(f) window._factureFourn = f.value;
  if(d) window._factureDate = d.value;
  if(p && window._facturePayMode==='partiel') window._facturePartiel = p.value;
}

function factureMaj(i, champ, val){
  if(_factureLignes[i]){ _factureLignes[i][champ] = val; }
  // mettre à jour le total affiché sans tout re-rendre (évite de perdre le focus)
  if(champ==='prix'){
    const t = document.querySelector('.big-total');
    if(t) t.textContent = fmt(factureTotal()) + ' ' + DB.parametres.devise;
  }
}
function factureAjouterLigne(){ factureSauverCommuns(); _factureLignes.push(ligneVide()); rendreFactureSheet(); }
function factureSupprLigne(i){ factureSauverCommuns(); _factureLignes.splice(i,1); if(_factureLignes.length===0)_factureLignes.push(ligneVide()); rendreFactureSheet(); }
function factureSetPay(mode){
  factureSauverCommuns();
  window._facturePayMode = mode;
  const inp = $('#fPartiel');
  if(inp) inp.style.display = mode==='partiel' ? 'block' : 'none';
  document.querySelectorAll('.seg button').forEach(b=>b.classList.remove('on'));
  // re-render léger des boutons
  rendreFactureSheet();
}

function factureEnregistrer(){
  const fournisseur = ($('#fFourn') && $('#fFourn').value.trim()) || '';
  const date = ($('#fDate') && $('#fDate').value) || auj();
  const mode = window._facturePayMode || 'tout';
  const partiel = ($('#fPartiel') && Number($('#fPartiel').value)) || 0;
  // valider : au moins une ligne avec produit + prix
  const valides = _factureLignes.filter(l=> (l.produit||'').trim() && (Number(l.prix)||0)>0);
  if(valides.length===0){ toast('Ajoutez au moins un produit avec son prix','err'); return; }

  const r = ajouterFacture({
    date, fournisseur,
    lignes: valides.map(l=>({
      produitNom: l.produit, categorieId: l.categorieId,
      cartons: l.cartons, contenu: l.contenu, prixGlobal: l.prix
    })),
    paiementMode: mode, montantPartiel: partiel
  });
  // nettoyer
  window._factureFourn = undefined; window._factureDate = undefined; window._facturePartiel = undefined;
  toast(r.crees.length + ' produits enregistrés ✓');
  closeSheet();
  go('achats');
}

function openImportSheet(){
  sheet(`
    <h2>📥 Importer des achats</h2>
    <div class="s-sub">Importez directement un fichier Excel (.xlsx) ou CSV.</div>

    <div class="card" style="background:var(--nuit);padding:14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Comment faire ?</div>
      <div style="font-size:12.5px;color:var(--texte-doux);line-height:1.6">
        1. Téléchargez le modèle ci-dessous<br>
        2. Remplissez-le avec vos achats (Excel ou tableur)<br>
        3. Importez-le ici — <b>le fichier Excel marche directement</b>
      </div>
      <button class="btn btn-ghost" onclick="telechargerModeleCSV()" style="margin-top:12px">📄 Télécharger le modèle CSV</button>
    </div>

    <div class="field" style="margin-top:14px">
      <label>Choisir votre fichier (Excel .xlsx ou CSV)</label>
      <input type="file" id="csvFile" accept=".csv,.xlsx,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" class="input" style="padding:10px">
    </div>

    <div id="importApercu"></div>

    <div class="btn-group">
      <button class="btn btn-ghost" onclick="closeSheet()">Fermer</button>
    </div>
  `);

  $('#csvFile').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const nom = (file.name||'').toLowerCase();
    const zone = $('#importApercu');
    if(nom.endsWith('.xlsx')){
      // Fichier Excel : décoder puis analyser
      if(zone) zone.innerHTML = '<div class="hint" style="margin-top:14px">Lecture du fichier Excel…</div>';
      const reader = new FileReader();
      reader.onload = async ev=>{
        try{
          const texte = await xlsxVersTexte(ev.target.result);
          window._importTexte = texte;
          const res = analyserCSVAchats(texte);
          window._importLignes = res.lignes;
          afficherApercuImport(res);
        }catch(err){
          if(zone) zone.innerHTML = `<div class="warn" style="margin-top:14px;background:#3a1414;border-color:var(--rouge)">
            <b style="color:var(--rouge)">Impossible de lire ce fichier Excel.</b><br>
            <span style="font-size:12px">Essayez de l'enregistrer en CSV, ou vérifiez qu'il vient bien du modèle fourni.</span></div>`;
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      // Fichier CSV / texte
      const reader = new FileReader();
      reader.onload = ev=>{
        window._importTexte = ev.target.result;
        const res = analyserCSVAchats(ev.target.result);
        window._importLignes = res.lignes;
        afficherApercuImport(res);
      };
      reader.readAsText(file);
    }
  });
}

function afficherApercuImport(res){
  const zone = $('#importApercu');
  if(!zone) return;
  if(res.lignes.length===0){
    zone.innerHTML = `<div class="warn" style="margin-top:14px;background:#3a1414;border-color:var(--rouge)">
      <b style="color:var(--rouge)">Aucune ligne valide.</b><br>
      <span style="font-size:12px">${res.erreurs.slice(0,4).join('<br>')||'Vérifiez le format du fichier.'}</span></div>`;
    return;
  }
  const inconnues = res.categoriesInconnues || [];
  const apercu = res.lignes.slice(0,10);

  // Section catégories inconnues (à créer avec leur prix de vente)
  const blocInconnues = inconnues.length ? `
    <div class="card" style="margin-top:14px;border-color:var(--orange);background:#2a1e0e">
      <div class="card-title" style="font-size:14px;margin-bottom:6px;color:var(--orange)">⚠️ Catégories inconnues</div>
      <div class="hint" style="margin-bottom:12px">Ces catégories n'existent pas encore. Indiquez leur <b>prix de vente</b> pour les créer.</div>
      ${inconnues.map(nom=>`
        <div class="cat-row" style="background:var(--nuit)">
          <div class="cat-info"><div class="cat-name">${nom}</div>
          <div class="cat-meta">prix de vente ?</div></div>
          <input class="cat-input" type="number" inputmode="numeric" min="0" placeholder="prix" data-newcat="${nom}">
        </div>`).join('')}
      <button class="btn btn-ambre" onclick="creerCategoriesImport()" style="margin-top:10px">➕ Créer ces catégories</button>
    </div>` : '';

  // Tableau d'aperçu (catégories inconnues en orange)
  const tableau = `
    <div class="card" style="margin-top:14px">
      <div class="card-title" style="font-size:14px;margin-bottom:10px">${inconnues.length?'Aperçu':'✓ '+res.lignes.length+' achat(s) prêt(s)'}</div>
      <div class="tbl-wrap"><table class="tbl">
        <tr><th>Date</th><th>Produit</th><th>Catégorie</th><th class="num">Prix</th></tr>
        ${apercu.map(l=>`<tr>
          <td style="font-size:11px;color:var(--texte-doux)">${dateFr(l.date)}</td>
          <td>${l.produitNom}</td>
          <td style="font-size:11px;${l.categorieInconnue?'color:var(--orange);font-weight:700':''}">${l.categorieInconnue?'⚠️ '+l.categorieNomBrut:l.categorieNom}</td>
          <td class="num">${fmt(l.prixGlobal)}</td>
        </tr>`).join('')}
      </table></div>
      ${res.lignes.length>10?`<div class="hint" style="margin-top:8px">…et ${res.lignes.length-10} autre(s)</div>`:''}
      ${res.erreurs.length?`<div class="hint" style="color:var(--orange);margin-top:8px">⚠️ ${res.erreurs.length} ligne(s) ignorée(s)</div>`:''}
      ${inconnues.length
        ? `<div class="hint" style="color:var(--orange);margin-top:10px">Créez d'abord les catégories inconnues ci-dessus avant d'importer.</div>`
        : `<button class="btn btn-ambre" onclick="confirmerImport()" style="margin-top:12px">✅ Importer ces ${res.lignes.length} achats</button>`}
    </div>`;

  zone.innerHTML = blocInconnues + tableau;
}

// Créer les catégories inconnues saisies, puis ré-analyser
function creerCategoriesImport(){
  const inputs = document.querySelectorAll('[data-newcat]');
  const couleurs = ['#5EEAD4','#60A5FA','#A78BFA','#C4B5FD','#FBBF24','#FB923C','#F472B6','#34D399','#FACC15','#818CF8'];
  let created = 0;
  inputs.forEach(inp=>{
    const nom = (inp.dataset.newcat||'').trim();
    const prix = Number(inp.value)||0;
    if(nom && prix>0 && !categorieParNom(nom)){
      DB.categories.push({ id: uid('cat'), nom, prix, couleur: couleurs[DB.categories.length % couleurs.length] });
      created++;
    }
  });
  if(created===0){ toast('Indiquez le prix de vente','err'); return; }
  sauverDB();
  toast(created + ' catégorie(s) créée(s) ✓');
  // ré-analyser le même fichier : les catégories sont maintenant reconnues
  const res = analyserCSVAchats(window._importTexte || '');
  window._importLignes = res.lignes;
  afficherApercuImport(res);
}

function confirmerImport(){
  const lignes = window._importLignes || [];
  if(lignes.length===0){ toast('Rien à importer','err'); return; }
  sauverDB();
  const n = importerAchats(lignes);
  window._importLignes = [];
  toast(n + ' achats importés ✓');
  closeSheet();
  go('achats');
}

function telechargerModeleCSV(){
  const csv = modeleCSVAchats();
  // BOM pour qu'Excel ouvre correctement les accents
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'modele_achats_frigo.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('Modèle téléchargé ✓');
}

function majEcartRegul(inp){
  const theo = Number(inp.dataset.theo)||0;
  const span = document.querySelector('.regEcart[data-for="'+inp.dataset.cat+'"]');
  if(inp.value===''){ if(span){span.textContent=''; } majResumeRegul(); return; }
  const phys = Number(inp.value)||0;
  const ec = phys - theo;
  if(span){
    span.textContent = (ec>0?'+':'') + ec;
    span.style.color = ec===0 ? 'var(--texte-doux)' : (ec<0 ? 'var(--rouge)' : 'var(--vert)');
  }
  majResumeRegul();
}

function majResumeRegul(){
  const inputs = document.querySelectorAll('.regInp');
  let nb = 0;
  inputs.forEach(inp=>{
    if(inp.value==='') return;
    const ec = (Number(inp.value)||0) - (Number(inp.dataset.theo)||0);
    if(ec!==0) nb++;
  });
  const r = $('#regResume');
  if(r) r.textContent = nb===0 ? 'Aucun écart pour le moment.' : nb+' catégorie(s) avec un écart à régulariser.';
}

function confirmerRegularisation(){
  const comptes = {};
  document.querySelectorAll('.regInp').forEach(inp=>{
    if(inp.value!=='') comptes[inp.dataset.cat] = inp.value;
  });
  const motif = $('#regMotif') ? $('#regMotif').value : '';
  const user = $('#regUser') ? $('#regUser').value.trim() : '';
  // mémoriser le nom du gérant pour la prochaine fois
  if(user){ if(!DB.parametres) DB.parametres={}; DB.parametres.gerant = user; }

  const apercu = apercuRegularisation(comptes).filter(x=>x.ecart!==0);
  if(apercu.length===0){ toast('Aucun écart à régulariser','err'); return; }

  const reg = regulariserStock({comptes, motif, user});
  if(!reg){ toast('Aucun écart à régulariser','err'); return; }
  toast(reg.lignes.length + ' catégorie(s) régularisée(s) ✓');
  closeSheet();
  go('stock');
}

  const hist = historiqueRegularisations();
  sheet(`

function lancerRecherche(terme){
  const zone = $('#rechResultats');
  if(!zone) return;
  if(!terme || terme.trim().length<1){ zone.innerHTML = '<div class="hint">Commencez à taper…</div>'; return; }
  const r = rechercher(terme);
  const total = r.achats.length + r.produits.length + r.fournisseurs.length + r.clients.length;
  if(total===0){ zone.innerHTML = '<div class="empty" style="padding:20px"><div style="font-size:13px">Aucun résultat</div></div>'; return; }
  let html = '';
  if(r.produits.length){
    html += `<div class="card" style="margin-bottom:10px"><div class="card-title" style="font-size:13px;margin-bottom:6px">🧴 Produits (${r.produits.length})</div>
      ${r.produits.slice(0,10).map(p=>{ const cat=DB.categories.find(c=>c.id===p.categorieId); return `<div class="cat-row"><div class="cat-info"><div class="cat-name" style="font-size:14px">${p.nom}</div><div class="cat-meta">${cat?cat.nom:''}</div></div></div>`; }).join('')}</div>`;
  }
  if(r.fournisseurs.length){
    html += `<div class="card" style="margin-bottom:10px"><div class="card-title" style="font-size:13px;margin-bottom:6px">🏢 Fournisseurs (${r.fournisseurs.length})</div>
      ${r.fournisseurs.map(f=>`<div class="cat-row" style="cursor:pointer" onclick="closeSheet();go('fournisseurs')"><div class="cat-info"><div class="cat-name" style="font-size:14px">${f.nom}</div><div class="cat-meta">doit ${fmt(soldeFournisseur(f.id))}</div></div></div>`).join('')}</div>`;
  }
  if(r.clients.length){
    html += `<div class="card" style="margin-bottom:10px"><div class="card-title" style="font-size:13px;margin-bottom:6px">👥 Clients (${r.clients.length})</div>
      ${r.clients.map(c=>`<div class="cat-row" style="cursor:pointer" onclick="closeSheet();openClientSheet('${c.id}')"><div class="cat-info"><div class="cat-name" style="font-size:14px">${c.nom}</div><div class="cat-meta">doit ${fmt(soldeClient(c.id))}</div></div></div>`).join('')}</div>`;
  }
  if(r.achats.length){
    html += `<div class="card"><div class="card-title" style="font-size:13px;margin-bottom:6px">📥 Achats (${r.achats.length})</div>
      ${r.achats.slice(0,15).map(a=>`<div class="cat-row"><div class="cat-info"><div class="cat-name" style="font-size:14px">${a.produit}</div><div class="cat-meta">${dateFr(a.date)}${a.fournisseur?' • '+a.fournisseur:''}</div></div><span style="font-weight:700">${fmt(a.prixGlobal)}</span></div>`).join('')}</div>`;
  }
  zone.innerHTML = html;
}

function majEcartCaisse(){
  const el = $('#rcPhys');
  const zone = $('#rcEcart');
  if(!el || !zone) return;
  if(el.value===''){ zone.textContent=''; return; }
  const ec = ecartCaisse(el.value);
  if(ec===0){ zone.innerHTML = '<span style="color:var(--vert)">✓ La caisse est juste, aucun écart.</span>'; }
  else if(ec<0){ zone.innerHTML = '<span style="color:var(--rouge)">Il manque '+fmt(-ec)+' '+DB.parametres.devise+' par rapport au théorique.</span>'; }
  else { zone.innerHTML = '<span style="color:var(--vert)">Il y a '+fmt(ec)+' '+DB.parametres.devise+' de plus que le théorique.</span>'; }
}

function confirmerRegulCaisse(){
  const el = $('#rcPhys');
  if(!el || el.value===''){ toast("Comptez l'argent réel",'err'); return; }
  const physique = Number(el.value)||0;
  const motif = $('#rcMotif') ? $('#rcMotif').value : '';
  const user = $('#rcUser') ? $('#rcUser').value.trim() : '';
  if(user){ if(!DB.parametres) DB.parametres={}; DB.parametres.gerant = user; }

  if(ecartCaisse(physique)===0){ toast('La caisse est déjà juste','err'); return; }
  const rc = regulariserCaisse({physique, motif, user});
  if(!rc){ toast('Aucun écart à régulariser','err'); return; }
  toast('Caisse régularisée ✓');
  closeSheet();
  go('caisse');
}

function telechargerSauvegarde(){
  try{
    const blob = new Blob([JSON.stringify(DB)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'frigo_sauvegarde_' + auj() + '.json';

    marquerSauvegarde();
    return true;
  }catch(e){ return false; }
}

function copierTexteClot(id){
  const ta = document.getElementById(id);
  let ok=false;
  try{ ta.select(); ta.setSelectionRange(0,999999); ok=document.execCommand('copy'); }catch(e){}
  try{ if(navigator.clipboard && ta){ navigator.clipboard.writeText(ta.value); ok=true; } }catch(e){}
  toast(ok?'Copi\u00e9 \u2713':'S\u00e9lectionnez le texte et copiez-le');
}

function copierSauvegardeComplete(){
  let ok=false;
  try{ if(navigator.clipboard){ navigator.clipboard.writeText(window._clotBackup||''); ok=true; } }catch(e){}
  telechargerSauvegarde();
  toast(ok?'Sauvegarde compl\u00e8te copi\u00e9e \u2713':'Sauvegarde t\u00e9l\u00e9charg\u00e9e');
}

/* ============================================================
   VÉRIFICATEUR DE MISE À JOUR
   Compare la version installée avec celle en ligne (GitHub Pages)
   et propose de recharger en contournant le cache.
   ============================================================ */
function versionApp(){
  const m = document.querySelector('meta[name="frigo-version"]');
  return m ? m.content : '?';
}

async function verifierMiseAJour(){
  try{
    if(location.protocol === 'file:') return 'impossible';
    const url = location.pathname + '?maj=' + Date.now();   // requête unique = cache contourné
    let txt = '';
    // On ne télécharge que les 3 premiers Ko : la version est tout en haut du fichier.
    // (avant, on téléchargeait les 358 Ko de l'application à chaque vérification)
    try{
      const r = await fetch(url, {cache:'no-store', headers:{'Range':'bytes=0-3071'}});
      if(r.ok || r.status === 206) txt = await r.text();
    }catch(e){}
    if(txt.indexOf('frigo-version') < 0){   // serveur qui ne gère pas les extraits : on reprend tout
      const r2 = await fetch(url, {cache:'no-store'});
      if(!r2.ok) return 'impossible';
      txt = await r2.text();
    }
    const m = txt.match(/frigo-version" content="([^"]+)"/);
    if(!m || !m[1]) return 'impossible';
    if(m[1] !== versionApp()){ afficherBandeauMAJ(m[1]); return 'nouvelle'; }
    return 'ajour';
  }catch(e){ return 'impossible'; }
}

function afficherBandeauMAJ(nouvelleVersion){
  if(document.getElementById('bandeauMaj')) return;
  const b = document.createElement('div');
  b.id = 'bandeauMaj';
  b.style.cssText = 'position:fixed;left:12px;right:12px;bottom:78px;z-index:9999;background:linear-gradient(135deg,#F59E0B,#FBBF24);color:#221703;font-weight:800;padding:13px 15px;border-radius:14px;box-shadow:0 10px 26px rgba(0,0,0,.5);text-align:center;font-size:14px;cursor:pointer';
  b.innerHTML = '🔄 Nouvelle version disponible<br><span style="font-weight:600;font-size:12px">Touchez ici pour mettre à jour — vos données sont conservées</span>';
  b.onclick = appliquerMiseAJour;
  document.body.appendChild(b);
}

async function appliquerMiseAJour(){
  // instantané de sécurité des données juste avant la mise à jour
  try{ localStorage.setItem('frigo_backup_avant_maj', JSON.stringify({date: new Date().toISOString(), version: versionApp(), db: DB})); }catch(e){}
  // vider la mémoire hors connexion pour bien charger la nouvelle version
  try{ if(window.caches) await caches.delete('frigo-app-v1'); }catch(e){}
  location.href = location.pathname + '?v=' + Date.now();   // rechargement version fraîche, données intactes
}

let _derniereVerifMaj = 0;
function verifierMajSiBesoin(){
  const t = Date.now();
  if(t - _derniereVerifMaj < 30*60*1000) return;   // au plus une fois toutes les 30 min
  _derniereVerifMaj = t;
  verifierMiseAJour();
}

function ventesParJour(){
  const map = {};
  const vide = (d)=>({ date:d, total:0, articles:0, categories:{}, saisi:0 });
  for(const inv of DB.inventaires){
    if(!map[inv.date]) map[inv.date] = vide(inv.date);
    const j = map[inv.date];
    j.total += inv.totalCA;
    for(const l of inv.lignes){
      if(l.vendu > 0){
        j.articles += l.vendu;
        if(!j.categories[l.categorieId]) j.categories[l.categorieId] = { nom:l.nom, prix:l.prix, vendu:0, montant:0 };
        j.categories[l.categorieId].vendu += l.vendu;
        j.categories[l.categorieId].montant += l.montant;
      }
    }
  }
  for(const v of (DB.ventesJour||[])){
    if(!map[v.date]) map[v.date] = vide(v.date);
    map[v.date].saisi += v.montant;
  }
  return Object.values(map).sort((a,b)=> a.date<b.date?1:-1);
}

/* Périodes couvertes par chaque inventaire.
   Un inventaire couvre tous les jours écoulés depuis le comptage précédent :
   c'est à cette échelle (et pas jour par jour) que la comparaison a un sens. */
function periodesInventaire(){
  const parDate = {};
  for(const inv of DB.inventaires){
    if(!parDate[inv.date]) parDate[inv.date] = { date: inv.date, calcule: 0 };
    parDate[inv.date].calcule += inv.totalCA;
  }
  const dates = Object.values(parDate).sort((a,b)=> a.date<b.date?-1:1);
  const saisies = DB.ventesJour || [];
  const res = [];
  let precedent = null;
  for(const d of dates){
    let saisi = 0;
    for(const v of saisies){
      if((!precedent || v.date > precedent) && v.date <= d.date) saisi += v.montant;
    }
    res.push({ debut: precedent, fin: d.date, calcule: d.calcule, saisi, enCours:false });
    precedent = d.date;
  }
  // période en cours : saisies faites après le dernier inventaire
  let apres = 0;
  for(const v of saisies){ if(!precedent || v.date > precedent) apres += v.montant; }
  if(apres > 0) res.push({ debut: precedent, fin: null, calcule: null, saisi: apres, enCours:true });
  return res.reverse();
}

/* ============================================================
   CAFÉ DÉTAILLÉ (jour par jour, achats par article, stats)
   ============================================================ */
function cafeParJour(debut, fin){
  const dans = (d)=> (!debut || d>=debut) && (!fin || d<=fin);
  const map = {};
  for(const v of (DB.cafeVentes||[])){
    if(!dans(v.date)) continue;
    if(!map[v.date]) map[v.date] = { date:v.date, ventes:0, achats:0, nbVentes:0 };
    map[v.date].ventes += v.montant; map[v.date].nbVentes++;
  }
  for(const a of (DB.cafeAchats||[])){
    if(!dans(a.date)) continue;
    if(!map[a.date]) map[a.date] = { date:a.date, ventes:0, achats:0, nbVentes:0 };
    map[a.date].achats += a.montant;
  }
  return Object.values(map).map(j=>({ ...j, resultat: j.ventes - j.achats }))
    .sort((a,b)=> a.date<b.date?1:-1);
}

function cafeAchatsParArticle(debut, fin){
  const dans = (d)=> (!debut || d>=debut) && (!fin || d<=fin);
  const map = {};
  for(const a of (DB.cafeAchats||[])){
    if(!dans(a.date)) continue;
    const cle = (a.article||'Autre').trim().toLowerCase();
    if(!map[cle]) map[cle] = { article:(a.article||'Autre').trim()||'Autre', total:0, nb:0 };
    map[cle].total += a.montant; map[cle].nb++;
  }
  return Object.values(map).sort((a,b)=> b.total - a.total);
}

function statsCafeAvancees(debut, fin){
  const jours = cafeParJour(debut, fin).filter(j=>j.ventes>0);
  const total = jours.reduce((s,j)=>s+j.ventes,0);
  let meilleur = null;
  for(const j of jours){ if(!meilleur || j.ventes>meilleur.ventes) meilleur = j; }
  return {
    nbJours: jours.length,
    moyenneJour: jours.length ? Math.round(total/jours.length) : 0,
    meilleurJour: meilleur
  };
}

/* ============================================================

   ============================================================ */
function blocComparaisonSemaines(){
  const arch = [...(DB.archivesSemaines||[])].sort((a,b)=> a.cloturLe<b.cloturLe?-1:1);
  if(arch.length < 2) return '';
  const dev = DB.parametres.devise;
  const lab = (s)=> dateFr(s.dateFin || s.cloturLe).slice(0,5);
  const dernieres = arch.slice(-8);
  const dataV = dernieres.map(s=>({ label: lab(s), valeur: Math.max(0, s.ventes||0) }));
  const dataB = dernieres.map(s=>({ label: lab(s), valeur: Math.max(0, s.benefice||0) }));
  const moyV = Math.round(arch.reduce((t,s)=>t+(s.ventes||0),0)/arch.length);
  const moyB = Math.round(arch.reduce((t,s)=>t+(s.benefice||0),0)/arch.length);
  let best = arch[0];
  for(const s of arch){ if((s.ventes||0) > (best.ventes||0)) best = s; }
  const der = arch[arch.length-1], prec = arch[arch.length-2];
  const diff = (der.ventes||0) - (prec.ventes||0);
  const pct = (prec.ventes>0) ? Math.round(diff/prec.ventes*100) : null;
  const coul = diff>0 ? 'var(--vert)' : (diff<0 ? 'var(--rouge)' : 'var(--texte-doux)');
  const ligne = (label, valeur, style)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span style="color:var(--texte-doux)">${label}</span><span style="${style||'font-weight:600'}">${valeur}</span></div>`;
  return `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title" style="font-size:14px;margin-bottom:8px">📈 Ventes par semaine</div>
      ${graphBarres(dataV, '#34D399')}
      <div class="card-title" style="font-size:14px;margin:14px 0 8px">💰 Bénéfice par semaine</div>
      ${graphBarres(dataB, '#FBBF24')}
      <div style="border-top:1px solid var(--bord);margin:12px 0 6px"></div>
      ${ligne('Moyenne des ventes', fmt(moyV)+' '+dev)}
      ${ligne('Moyenne du bénéfice', fmt(moyB)+' '+dev)}
      ${ligne('Meilleure semaine', lab(best)+' • '+fmt(best.ventes)+' '+dev)}
      ${ligne('Dernière vs précédente', (diff>0?'+':'')+fmt(diff)+' '+dev+(pct!==null?' ('+(pct>0?'+':'')+pct+'%)':''), 'font-weight:700;color:'+coul)}
    </div>`;
}
/* ============================================================
   SITUATION DES ACHATS PAR DATE
   (les « soldes reportés » créés à la clôture sont exclus :
    ce sont des dettes reprises, pas de nouveaux achats)
   ============================================================ */
function achatsParJour(debut, fin){
  const dans = (d)=> (!debut || d>=debut) && (!fin || d<=fin);
  const map = {};
  for(const a of DB.achats){
    if(a.reporte) continue;
    if(!dans(a.date)) continue;
    if(!map[a.date]) map[a.date] = { date:a.date, total:0, paye:0, nb:0, lignes:[] };
    const j = map[a.date];
    j.total += Number(a.prixGlobal)||0;
    j.paye  += Number(a.montantPaye)||0;
    j.nb++;
    j.lignes.push(a);
  }
  return Object.values(map)
    .map(j=>({ ...j, credit: Math.max(0, j.total - j.paye) }))
    .sort((a,b)=> a.date<b.date?1:-1);
}

function achatsParFournisseur(debut, fin){
  const dans = (d)=> (!debut || d>=debut) && (!fin || d<=fin);
  const map = {};
  for(const a of DB.achats){
    if(a.reporte) continue;
    if(!dans(a.date)) continue;
    const nom = (a.fournisseur||'').trim() || 'Divers';
    if(!map[nom]) map[nom] = { nom, total:0, nb:0 };
    map[nom].total += Number(a.prixGlobal)||0;
    map[nom].nb++;
  }
  return Object.values(map).sort((a,b)=> b.total - a.total);
}

/* ============================================================
   FOURNISSEURS : renommer / fusionner / supprimer / régulariser
   ============================================================ */
function renommerFournisseur(fId, nouveauNom){
  const f = DB.fournisseurs.find(x=>x.id===fId);
  if(!f) return null;
  const nom = (nouveauNom||'').trim();
  if(!nom) return null;
  const existant = DB.fournisseurs.find(x=>x.id!==fId && (x.nom||'').toLowerCase() === nom.toLowerCase());
  if(existant){
    // même nom qu'un autre compte : on fusionne tout dessus (rien n'est perdu)
    for(const a of DB.achats){ if(a.fournisseurId===fId){ a.fournisseurId = existant.id; a.fournisseur = existant.nom; } }
    for(const p of DB.paiements){ if(p.fournisseurId===fId) p.fournisseurId = existant.id; }
    for(const r of (DB.regularisationsFournisseur||[])){ if(r.fournisseurId===fId) r.fournisseurId = existant.id; }
    DB.fournisseurs = DB.fournisseurs.filter(x=>x.id!==fId);
    sauverDB();
    return { fusion:true, vers: existant };
  }
  f.nom = nom;
  for(const a of DB.achats){ if(a.fournisseurId===fId) a.fournisseur = nom; }
  sauverDB();
  return { fusion:false, fournisseur:f };
}

function supprimerFournisseur(fId){
  const f = DB.fournisseurs.find(x=>x.id===fId);
  if(!f) return false;
  if(DB.achats.some(a=>a.fournisseurId===fId)) return false;   // sécurité : on ne perd aucun achat
  versCorbeille('fournisseur', f, 'Fournisseur : '+f.nom);
  DB.fournisseurs = DB.fournisseurs.filter(x=>x.id!==fId);
  DB.paiements = DB.paiements.filter(p=>p.fournisseurId!==fId);
  DB.regularisationsFournisseur = (DB.regularisationsFournisseur||[]).filter(r=>r.fournisseurId!==fId);
  sauverDB();
  return true;
}

/* Aligner le compte sur ce qui est réellement dû, sans toucher aux achats ni aux paiements */
function regulariserFournisseur({fournisseurId, montantReel, motif, user, date}){
  const f = DB.fournisseurs.find(x=>x.id===fournisseurId);
  if(!f) return null;
  const reel = Number(montantReel);
  if(isNaN(reel) || reel < 0) return null;
  const brut = soldeFournisseurBrut(fournisseurId);
  const ecart = reel - brut;
  if(ecart === 0) return null;
  if(!DB.regularisationsFournisseur) DB.regularisationsFournisseur = [];
  const r = {
    id: uid('rf'), date: date||auj(), fournisseurId,
    ancienSolde: Math.max(0, brut), nouveauSolde: reel, ecart,
    motif: (motif||'').trim() || 'Non précisé',
    user: (user||'').trim() || 'Gérant'
  };
  DB.regularisationsFournisseur.push(r);
  sauverDB();
  return r;
}
function supprimerRegulFournisseur(id){
  const r = (DB.regularisationsFournisseur||[]).find(x=>x.id===id);
  if(r) versCorbeille('regulFournisseur', r, 'Régularisation fournisseur du '+dateFr(r.date));
  DB.regularisationsFournisseur = (DB.regularisationsFournisseur||[]).filter(x=>x.id!==id);
  sauverDB();
}

/* ============================================================
   ÉPARGNE — l'argent mis de côté
   Sort de la caisse (ce n'est pas une dépense : l'argent reste à vous)
   et se reporte d'une semaine à l'autre.
   ============================================================ */
function totalEpargne(){
  let t = Number(DB.epargneReportee)||0;
  for(const e of (DB.epargne||[])) t += (e.sens==='retrait' ? -e.montant : e.montant);
  return Math.max(0, t);
}
function ajouterEpargne({date, montant, note}){
  montant = Number(montant)||0;
  if(montant<=0) return null;
  if(!DB.epargne) DB.epargne = [];
  const e = { id: uid('ep'), date: date||auj(), sens:'depot', montant, note:(note||'').trim() };
  DB.epargne.push(e);
  sauverDB();
  return e;
}
function retirerEpargne({date, montant, note}){
  montant = Number(montant)||0;
  if(montant<=0) return null;
  const dispo = totalEpargne();
  if(dispo<=0) return null;
  if(montant > dispo) montant = dispo;      // on ne retire pas plus qu'on n'a mis
  if(!DB.epargne) DB.epargne = [];
  const e = { id: uid('ep'), date: date||auj(), sens:'retrait', montant, note:(note||'').trim() };
  DB.epargne.push(e);
  sauverDB();
  return e;
}
function supprimerMouvementEpargne(id){
  const e = (DB.epargne||[]).find(x=>x.id===id);
  if(e) versCorbeille('epargne', e, (e.sens==='retrait'?'Retrait':'Mise de côté')+' épargne du '+dateFr(e.date));
  DB.epargne = (DB.epargne||[]).filter(x=>x.id!==id);
  sauverDB();
}

/* ============================================================
   FONCTIONNEMENT HORS CONNEXION
   Installe un petit assistant (sw.js) qui garde l'application dans
   la mémoire du téléphone. Si sw.js n'est pas encore déposé sur le
   serveur, l'application continue de marcher normalement.
   ============================================================ */
try{
  if('serviceWorker' in navigator && location.protocol === 'https:'){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){ /* sans assistant, l'app marche quand même */ });
    });
  }
}catch(e){}

function majEtatConnexion(){
  try{
    const hors = (navigator.onLine === false);
    let el = document.getElementById('bandeauHorsLigne');
    if(hors && !el){
      el = document.createElement('div');
      el.id = 'bandeauHorsLigne';
      el.style.cssText = 'position:fixed;left:12px;right:12px;bottom:78px;z-index:9998;background:#1E293B;border:1px solid #475569;color:#CBD5E1;padding:9px 12px;border-radius:12px;text-align:center;font-size:12.5px;font-weight:600';
      el.textContent = '📴 Hors connexion — FRIGO fonctionne normalement';
      document.body.appendChild(el);
    } else if(!hors && el && el.remove){
      el.remove();
    }
  }catch(e){}
}
try{
  window.addEventListener('online', majEtatConnexion);
  window.addEventListener('offline', majEtatConnexion);
  setTimeout(majEtatConnexion, 1200);
}catch(e){}
</script>
</body>
</html>
